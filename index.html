<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminplan – Gantt</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #f4f3f0; --surface: #ffffff; --border: #d8d6d0; --border-dark: #a09d95;
    --text: #1a1917; --text-muted: #6b6860; --accent: #2a52be;
    --header-bg: #1a1917; --header-text: #f4f3f0;
    --row-hover: #f9f8f5; --row-alt: #faf9f6; --today-line: #e74c3c;
    --radius: 3px;
    --font-mono: 'IBM Plex Mono', monospace; --font-sans: 'IBM Plex Sans', sans-serif;
    --col-nr: 64px; --col-vorgang: 200px; --col-abh: 70px; --col-verz: 70px;
    --col-start: 96px; --col-tage: 54px; --col-ende: 96px; --col-farbe: 120px;
    --row-h: 36px; --header-h: 28px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: var(--bg); color: var(--text); font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  #topbar { background: var(--header-bg); color: var(--header-text); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; border-bottom: 2px solid var(--accent); }
  #topbar h1 { font-family: var(--font-mono); font-size: 14px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; flex: 1; }
  .tb-btn { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: .05em; background: transparent; border: 1px solid rgba(244,243,240,.3); color: var(--header-text); padding: 5px 11px; cursor: pointer; border-radius: var(--radius); transition: background .15s; white-space: nowrap; }
  .tb-btn:hover { background: rgba(255,255,255,.1); border-color: rgba(244,243,240,.6); }
  .tb-btn.primary { background: var(--accent); border-color: var(--accent); }
  .tb-btn.primary:hover { background: #1e3fa0; }
  .tb-btn.success { background: #1a6b3a; border-color: #1a6b3a; }
  .tb-sep { width: 1px; height: 20px; background: rgba(244,243,240,.2); flex-shrink: 0; }
  .scale-wrap { display: flex; align-items: center; gap: 6px; }
  .scale-wrap label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .06em; opacity: .7; text-transform: uppercase; }
  .scale-wrap select { font-family: var(--font-mono); font-size: 11px; background: rgba(255,255,255,.08); border: 1px solid rgba(244,243,240,.3); color: var(--header-text); padding: 4px 8px; border-radius: var(--radius); cursor: pointer; }
  .scale-wrap select option { background: #1a1917; }

  #main { display: flex; flex: 1; overflow: hidden; }

  #left-panel { display: flex; flex-direction: column; flex-shrink: 0; flex-grow: 0; background: var(--surface); overflow: hidden; z-index: 10; box-shadow: 2px 0 6px rgba(0,0,0,.06); }
  #left-header { display: flex; background: var(--header-bg); color: var(--header-text); font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; flex-shrink: 0; height: calc(var(--header-h)*2 + 1px); border-bottom: 2px solid var(--border-dark); align-items: flex-end; }
  .lh-cell { padding: 0 6px 4px; border-right: 1px solid rgba(244,243,240,.15); height: 100%; display: flex; align-items: flex-end; white-space: nowrap; }
  .lh-cell-check { width: 32px; flex-shrink: 0; border-right: 1px solid rgba(244,243,240,.15); height: 100%; }
  #left-body { overflow-y: auto; overflow-x: hidden; flex: 1; }
  #left-body::-webkit-scrollbar { width: 6px; }
  #left-body::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 3px; }

  .table-row { display: flex; height: var(--row-h); border-bottom: 1px solid var(--border); align-items: center; position: relative; transition: background .1s; }
  .table-row:nth-child(even) { background: var(--row-alt); }
  .table-row:hover { background: var(--row-hover); }
  .table-row.done .vorgang-text { text-decoration: line-through; color: var(--text-muted); }
  .table-row.hidden-row { display: none; }
  .table-row.group-row { background: #e8e6e2 !important; }
  .table-row.group-row:hover { background: #dfddd8 !important; }

  .cell { padding: 0 6px; border-right: 1px solid var(--border); height: 100%; display: flex; align-items: center; flex-shrink: 0; overflow: hidden; }
  .cell input, .cell select { width: 100%; border: none; outline: none; background: transparent; font-family: var(--font-sans); font-size: 12px; color: var(--text); padding: 0; }
  .cell input[type="number"] { font-family: var(--font-mono); font-size: 11px; }
  .cell input[readonly] { cursor: default; color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; }
  .cell select { cursor: pointer; font-size: 11px; }

  .cell-check { width: 32px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); height: 100%; cursor: pointer; }
  .check-box { width: 16px; height: 16px; border: 1.5px solid var(--border-dark); border-radius: 3px; display: flex; align-items: center; justify-content: center; transition: background .15s; flex-shrink: 0; }
  .check-box:hover { border-color: var(--accent); }
  .check-box.checked { background: var(--accent); border-color: var(--accent); }
  .check-box.checked::after { content: ''; display: block; width: 4px; height: 7px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px,-1px); }

  .cell-nr { width: var(--col-nr); font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .cell-nr.group-nr { color: var(--text); font-weight: 700; }
  .cell-vorgang { width: var(--col-vorgang); overflow: visible; }
  .vorgang-inner { display: flex; align-items: center; width: 100%; gap: 4px; }
  .vorgang-text { flex: 1; min-width: 0; }
  .vorgang-text input { font-size: 12px; }
  .group-row .vorgang-text input { font-weight: 600; }
  .cell-abh { width: var(--col-abh); }
  .cell-verz { width: var(--col-verz); }
  .cell-start { width: var(--col-start); }
  .cell-tage { width: var(--col-tage); }
  .cell-ende { width: var(--col-ende); }
  .cell-farbe { width: var(--col-farbe); }
  .color-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; border: 1px solid rgba(0,0,0,.15); }
  .del-btn { width: 22px; height: 22px; background: none; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; color: #c0392b; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; opacity: 0; transition: opacity .15s; }
  .table-row:hover .del-btn { opacity: 1; }
  .del-btn:hover { background: #fde8e8; }

  .toggle-btn { width: 16px; height: 16px; flex-shrink: 0; background: rgba(0,0,0,.1); border: none; border-radius: 2px; cursor: pointer; font-size: 9px; display: flex; align-items: center; justify-content: center; color: var(--text); transition: background .15s; padding: 0; }
  .toggle-btn:hover { background: rgba(0,0,0,.2); }
  .add-sub-btn { width: 16px; height: 16px; flex-shrink: 0; background: var(--accent); border: none; border-radius: 2px; cursor: pointer; font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center; color: white; opacity: 0; transition: opacity .15s, background .15s; padding: 0; }
  .table-row:hover .add-sub-btn { opacity: 1; }
  .add-sub-btn:hover { background: #1e3fa0; }
  .sub-indent { width: 14px; flex-shrink: 0; }

  #resizer { width: 5px; flex-shrink: 0; background: var(--border-dark); cursor: col-resize; position: relative; z-index: 20; transition: background .15s; }
  #resizer:hover, #resizer.dragging { background: var(--accent); }
  #resizer::after { content: '⋮'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: white; font-size: 12px; opacity: .6; pointer-events: none; }

  #right-panel { flex: 1; overflow: auto; position: relative; background: var(--surface); }
  #right-panel::-webkit-scrollbar { height: 8px; width: 8px; }
  #right-panel::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 3px; }
  #gantt-container { position: relative; min-width: 100%; }
  #gantt-header { position: sticky; top: 0; z-index: 5; background: var(--header-bg); border-bottom: 2px solid var(--border-dark); }
  #gantt-header-top { display: flex; height: var(--header-h); border-bottom: 1px solid rgba(244,243,240,.15); }
  #gantt-header-bot { display: flex; height: var(--header-h); }
  .gh-cell { font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--header-text); letter-spacing: .05em; border-right: 1px solid rgba(244,243,240,.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; white-space: nowrap; padding: 0 4px; text-transform: uppercase; }
  .gh-cell-sub { font-family: var(--font-mono); font-size: 9px; color: rgba(244,243,240,.6); border-right: 1px solid rgba(244,243,240,.08); display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0 2px; white-space: nowrap; }
  .gantt-row { height: var(--row-h); border-bottom: 1px solid var(--border); position: relative; transition: background .1s; }
  .gantt-row:nth-child(even) { background: var(--row-alt); }
  .gantt-row:hover { background: var(--row-hover); }
  .gantt-row.hidden-row { display: none; }
  .gantt-row.group-gantt-row { background: #e8e6e2 !important; }
  .grid-line { position: absolute; top: 0; bottom: 0; width: 1px; pointer-events: none; z-index: 1; }
  .grid-line.major { background: rgba(0,0,0,.1); }
  .grid-line.minor { background: rgba(0,0,0,.04); }
  #today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--today-line); z-index: 4; pointer-events: none; }
  #today-line::before { content: 'HEUTE'; position: absolute; top: 0; left: 3px; font-family: var(--font-mono); font-size: 8px; font-weight: 600; color: var(--today-line); letter-spacing: .05em; white-space: nowrap; }

  .gantt-bar-wrap { position: absolute; top: 5px; height: calc(var(--row-h) - 10px); cursor: grab; z-index: 3; user-select: none; }
  .gantt-bar-wrap:active { cursor: grabbing; }
  .gantt-bar { width: 100%; height: 100%; border-radius: 2px; transition: filter .15s; border: 1.5px solid rgba(0,0,0,.2); box-shadow: 0 1px 3px rgba(0,0,0,.15); position: relative; overflow: hidden; }
  .gantt-bar::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 40%; background: rgba(255,255,255,.2); border-radius: 2px 2px 0 0; }
  .gantt-bar-wrap:hover .gantt-bar { filter: brightness(1.08); }
  .gantt-bar-wrap.done .gantt-bar { background: #ddd !important; border-color: #bbb !important; opacity: .7; }

  /* Group bracket bar: vertical line left + vertical line right + horizontal top connector */
  .gantt-bar-wrap.group-wrap { top: 4px; height: calc(var(--row-h) - 8px); cursor: default; background: transparent !important; }
  .gantt-bar-wrap.group-wrap .gantt-bar { display: none; }
  /* horizontal top line */
  .group-bracket-top  { position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  /* left vertical leg */
  .group-bracket-l    { position: absolute; top: 0; left: 0; width: 2px; height: 100%; }
  /* right vertical leg */
  .group-bracket-r    { position: absolute; top: 0; right: 0; width: 2px; height: 100%; }

  .gantt-resize-handle { position: absolute; right: 0; top: 0; width: 8px; height: 100%; cursor: ew-resize; z-index: 5; display: flex; align-items: center; justify-content: center; }
  .gantt-resize-handle::after { content: ''; display: block; width: 2px; height: 60%; background: rgba(255,255,255,.5); border-radius: 1px; }
  .gantt-bar-wrap:hover .gantt-resize-handle::after { background: rgba(255,255,255,.85); }
  .gantt-label { position: absolute; left: calc(100% + 6px); top: 50%; transform: translateY(-50%); font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); white-space: nowrap; pointer-events: none; z-index: 3; }
  .gantt-bar-wrap.done .gantt-label { text-decoration: line-through; }

  #footer { background: var(--header-bg); color: rgba(244,243,240,.5); font-family: var(--font-mono); font-size: 10px; padding: 4px 16px; letter-spacing: .05em; flex-shrink: 0; display: flex; gap: 24px; }

  @media print {
    #topbar, #footer { display: none !important; }
    body { height: auto; overflow: visible; }
    #main { overflow: visible; height: auto; }
    #right-panel { overflow: visible; }
    #gantt-header { position: static; }
  }
</style>
</head>
<body>

<div id="topbar">
  <h1>Terminplan // Gantt</h1>
  <div class="scale-wrap">
    <label>Skala</label>
    <select id="scaleSelect" onchange="setScale(this.value)">
      <option value="day">Tage</option>
      <option value="week" selected>Wochen</option>
      <option value="month">Monate</option>
    </select>
  </div>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="addRow()">+ Vorgang</button>
  <button class="tb-btn success" onclick="addGroupRow()">+ Gruppe</button>
  <button class="tb-btn" onclick="resetPlan()">Neu</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="saveAsFile()">&#128190; Speichern</button>
  <button class="tb-btn primary" onclick="exportPDF()">PDF Export</button>
</div>

<div id="main">
  <div id="left-panel">
    <div id="left-header">
      <div class="lh-cell-check"></div>
      <div class="lh-cell cell-nr">Nr.</div>
      <div class="lh-cell cell-vorgang">Vorgang</div>
      <div class="lh-cell cell-abh">Abh.</div>
      <div class="lh-cell cell-verz">Verz.</div>
      <div class="lh-cell cell-start">Start</div>
      <div class="lh-cell cell-tage">Tage</div>
      <div class="lh-cell cell-ende">Ende</div>
      <div class="lh-cell cell-farbe">Farbe</div>
      <div class="lh-cell" style="width:28px"></div>
    </div>
    <div id="left-body"></div>
  </div>
  <div id="resizer"></div>
  <div id="right-panel">
    <div id="gantt-container">
      <div id="gantt-header">
        <div id="gantt-header-top"></div>
        <div id="gantt-header-bot"></div>
      </div>
      <div id="gantt-body"></div>
      <div id="today-line"></div>
    </div>
  </div>
</div>

<div id="footer">
  <span>&#10003; Haken / Doppelklick Balken = erledigt &nbsp;|&nbsp; + an Zeile = Untervorgang</span>
  <span>Balken ziehen = verschieben &nbsp;|&nbsp; Rechter Rand = verl&#228;ngern</span>
  <span id="statusText"></span>
</div>

<!-- SAVED DATA (injected by saveAsFile, read by loadState) -->
<script id="gantt-data" type="application/json"></script>

<script>
const COLORS = {
  'Blau':'#2a52be','Grün':'#27ae60','Rot':'#e74c3c','Orange':'#e67e22',
  'Lila':'#8e44ad','Türkis':'#16a085','Grau':'#7f8c8d','Dunkelblau':'#1a3a6b',
  'Gelb':'#f39c12','Rosa':'#e91e8c','Anthrazit':'#2c3e50','Braun':'#795548',
};
const COL_W = { day:24, week:16, month:6 };

let scale = 'week', cellPx = COL_W.week;
let rows = [];
let nextId = 1;
let ganttStart = null, ganttEnd = null;

// ── NUMBERING ──────────────────────────────────────────────────────────────

function displayNr(row) {
  if (!row.parentId) {
    let n = 0;
    for (const r of rows) { if (!r.parentId) n++; if (r === row) break; }
    return String(n);
  }
  const parent = rows.find(r => r.id === row.parentId);
  const pNr = parent ? displayNr(parent) : '?';
  let n = 0;
  for (const r of rows) { if (r.parentId === row.parentId) n++; if (r === row) break; }
  return pNr + '.' + n;
}

// ── DATE HELPERS ───────────────────────────────────────────────────────────

function parseDate(s) {
  if (!s) return null;
  const p = s.split('.');
  if (p.length === 3) return new Date(+p[2], +p[1]-1, +p[0]);
  return new Date(s);
}
function fmtDate(d) {
  if (!d) return '';
  return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function daysBetween(a,b){ return Math.round((b-a)/86400000); }

function computeEnd(row, effStart) {
  const s = parseDate(effStart != null ? effStart : row.start);
  if (!s) return '';
  // For groups, use the span across all children instead of row.tage
  const tage = row.isGroup ? getGroupTage(row) : (+row.tage || 1);
  if (!tage) return '';
  return fmtDate(addDays(s, tage - 1));
}

function getEffStart(row) {
  if (row.isGroup) {
    const kids = rows.filter(r => r.parentId === row.id);
    if (!kids.length) return row.start;
    const starts = kids.map(c => parseDate(getEffStart(c))).filter(Boolean);
    if (!starts.length) return row.start;
    return fmtDate(new Date(Math.min(...starts)));
  }
  if (!row.abh) return row.start;
  const dep = rows.find(r => displayNr(r) === String(row.abh));
  if (!dep) return row.start;
  const depEffStart = getEffStart(dep);
  const depEnd = parseDate(computeEnd(dep, depEffStart));
  if (!depEnd) return row.start;
  const verz = parseInt(row.verz) || 0;
  return fmtDate(addDays(depEnd, verz + 1));
}

function getGroupTage(row) {
  const kids = rows.filter(r => r.parentId === row.id);
  if (!kids.length) return 1;
  const starts = kids.map(c => parseDate(getEffStart(c))).filter(Boolean);
  const ends   = kids.map(c => parseDate(computeEnd(c, getEffStart(c)))).filter(Boolean);
  if (!starts.length || !ends.length) return 1;
  return daysBetween(new Date(Math.min(...starts)), new Date(Math.max(...ends))) + 1;
}

// ── SCALE ──────────────────────────────────────────────────────────────────

function setScale(s){ scale=s; cellPx=COL_W[s]; renderAll(); }

// ── ROW OPS ────────────────────────────────────────────────────────────────

function addRow(afterId) {
  const row = { id:nextId++, parentId:null, isGroup:false, collapsed:false,
    vorgang:'Neuer Vorgang', abh:'', verz:'0', start:fmtDate(new Date()), tage:'10', farbe:'Blau', done:false };
  if (afterId != null) {
    let idx = rows.findIndex(r => r.id === afterId) + 1;
    while (idx < rows.length && rows[idx].parentId === afterId) idx++;
    rows.splice(idx, 0, row);
  } else { rows.push(row); }
  renderAll();
  focus(row.id);
}

function addGroupRow() {
  const row = { id:nextId++, parentId:null, isGroup:true, collapsed:false,
    vorgang:'Neue Gruppe', abh:'', verz:'0', start:fmtDate(new Date()), tage:'1', farbe:'Anthrazit', done:false };
  rows.push(row);
  renderAll();
  focus(row.id);
}

function addSubRow(parentId) {
  const parent = rows.find(r => r.id === parentId);
  if (!parent) return;
  parent.isGroup = true; parent.collapsed = false;
  const kids = rows.filter(r => r.parentId === parentId);
  const last = kids[kids.length-1];
  const row = { id:nextId++, parentId, isGroup:false, collapsed:false,
    vorgang:'Untervorgang', abh:'', verz:'0', start:fmtDate(new Date()), tage:'5', farbe:parent.farbe, done:false };
  const idx = last ? rows.indexOf(last)+1 : rows.indexOf(parent)+1;
  rows.splice(idx, 0, row);
  renderAll();
  focus(row.id);
}

function focus(id) {
  setTimeout(() => {
    const el = document.querySelector(`.table-row[data-id="${id}"] .vorgang-input`);
    if (el) { el.focus(); el.select(); }
  }, 50);
}

function deleteRow(id) {
  rows = rows.filter(r => r.id !== id && r.parentId !== id);
  renderAll();
}

function toggleCollapse(id) {
  const r = rows.find(r => r.id === id);
  if (r) { r.collapsed = !r.collapsed; renderAll(); }
}

function updateRow(id, field, value) {
  const r = rows.find(r => r.id === id);
  if (r) { r[field] = value; renderAll(); }
}

function toggleDone(id) {
  const r = rows.find(r => r.id === id);
  if (r) { r.done = !r.done; renderAll(); }
}

function resetPlan() {
  if (rows.length && !confirm('Terminplan zurücksetzen?')) return;
  rows = []; nextId = 1;
  const today = new Date();
  rows.push({ id:nextId++, parentId:null, isGroup:true, collapsed:false, vorgang:'Neues Projekt', abh:'', verz:'0', start:fmtDate(today), tage:'1', farbe:'Anthrazit', done:false });
  renderAll();
}

// ── DATE RANGE ─────────────────────────────────────────────────────────────

function computeDateRange() {
  const today = new Date();
  let min = addDays(today,-7), max = addDays(today,90);
  rows.forEach(r => {
    const s = parseDate(getEffStart(r));
    if (s && s < min) min = new Date(s);
    const e = parseDate(computeEnd(r, getEffStart(r)));
    if (e) { const p = addDays(e,14); if (p>max) max=p; }
  });
  while (min.getDay()!==1) min.setDate(min.getDate()-1);
  while (max.getDay()!==0) max.setDate(max.getDate()+1);
  ganttStart=min; ganttEnd=max;
}

function isVisible(row) {
  if (!row.parentId) return true;
  const p = rows.find(r => r.id === row.parentId);
  return !p || !p.collapsed;
}

// ── RENDER ─────────────────────────────────────────────────────────────────

function renderAll() {
  computeDateRange();
  renderTableRows();
  renderGanttHeader();
  renderGanttRows();
  positionTodayLine();
  syncScroll();
  saveState();
}

function renderTableRows() {
  const body = document.getElementById('left-body');
  body.innerHTML = '';
  rows.forEach(row => {
    const effStart = getEffStart(row);
    const tage = row.isGroup ? getGroupTage(row) : (+row.tage||1);
    const end = row.isGroup ? computeEnd({tage}, effStart) : computeEnd(row, effStart);
    const nr = displayNr(row);
    const isChild = !!row.parentId;
    const colorOpts = Object.entries(COLORS).map(([n]) =>
      `<option value="${n}" ${row.farbe===n?'selected':''}>${n}</option>`).join('');

    const div = document.createElement('div');
    let cls = 'table-row';
    if (row.isGroup) cls += ' group-row';
    if (row.done)   cls += ' done';
    if (!isVisible(row)) cls += ' hidden-row';
    div.className = cls;
    div.dataset.id = row.id;

    const startVal = (row.abh || row.isGroup) ? effStart : row.start;
    const startRO  = (row.abh || row.isGroup) ? 'readonly' : '';
    const tageRO   = row.isGroup ? 'readonly' : '';

    const indent     = isChild ? '<span class="sub-indent"></span>' : '';
    const collapseB  = row.isGroup
      ? `<button class="toggle-btn" onclick="toggleCollapse(${row.id})">${row.collapsed?'▶':'▼'}</button>`
      : '';
    const addSubB    = `<button class="add-sub-btn" title="Untervorgang" onclick="addSubRow(${row.id})">+</button>`;

    div.innerHTML = `
      <div class="cell-check" onclick="toggleDone(${row.id})"><div class="check-box ${row.done?'checked':''}"></div></div>
      <div class="cell cell-nr ${row.isGroup?'group-nr':''}">${nr}</div>
      <div class="cell cell-vorgang">
        <div class="vorgang-inner">
          ${indent}${collapseB}
          <div class="vorgang-text">
            <input class="vorgang-input" type="text" value="${esc(row.vorgang)}" placeholder="Bezeichnung"
              onchange="updateRow(${row.id},'vorgang',this.value)"
              style="width:100%;border:none;outline:none;background:transparent;font-family:var(--font-sans);font-size:12px;color:var(--text);padding:0;${row.isGroup?'font-weight:600;':''}">
          </div>
          ${addSubB}
        </div>
      </div>
      <div class="cell cell-abh"><input type="text" value="${row.abh}" placeholder="–" onchange="updateRow(${row.id},'abh',this.value)" ${row.isGroup?'readonly':''}></div>
      <div class="cell cell-verz"><input type="number" value="${row.verz}" onchange="updateRow(${row.id},'verz',this.value)" ${row.isGroup?'readonly':''}></div>
      <div class="cell cell-start"><input type="text" value="${startVal}" ${startRO} placeholder="TT.MM.JJJJ" onchange="updateRow(${row.id},'start',this.value)"></div>
      <div class="cell cell-tage"><input type="number" min="1" value="${tage}" ${tageRO} onchange="updateRow(${row.id},'tage',this.value)"></div>
      <div class="cell cell-ende"><input type="text" value="${end}" readonly></div>
      <div class="cell cell-farbe">
        <div class="color-dot" style="background:${COLORS[row.farbe]||'#555'}"></div>
        <select onchange="updateRow(${row.id},'farbe',this.value)">${colorOpts}</select>
      </div>
      <div class="cell" style="width:28px;border-right:none"><button class="del-btn" onclick="deleteRow(${row.id})">×</button></div>
    `;
    body.appendChild(div);
  });
}

// ── GANTT HEADER ───────────────────────────────────────────────────────────

function getWeekNr(d) {
  const t = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dn = t.getUTCDay()||7; t.setUTCDate(t.getUTCDate()+4-dn);
  return Math.ceil((((t-new Date(Date.UTC(t.getUTCFullYear(),0,1)))/86400000)+1)/7);
}

function renderGanttHeader() {
  const top = document.getElementById('gantt-header-top');
  const bot = document.getElementById('gantt-header-bot');
  top.innerHTML=''; bot.innerHTML='';
  const totalDays = daysBetween(ganttStart,ganttEnd)+1;

  if (scale==='day') {
    let d=new Date(ganttStart);
    while(d<=ganttEnd){const ms=new Date(d);let cnt=0,m=d.getMonth();while(d<=ganttEnd&&d.getMonth()===m){cnt++;d.setDate(d.getDate()+1);}const c=document.createElement('div');c.className='gh-cell';c.style.width=(cnt*cellPx)+'px';c.textContent=ms.toLocaleString('de-DE',{month:'long',year:'numeric'});top.appendChild(c);}
    d=new Date(ganttStart);
    while(d<=ganttEnd){const c=document.createElement('div');c.className='gh-cell-sub';c.style.width=cellPx+'px';c.textContent=d.getDate();bot.appendChild(c);d.setDate(d.getDate()+1);}
  } else if (scale==='week') {
    let d=new Date(ganttStart);
    while(d<=ganttEnd){const ms=new Date(d);let cnt=0,m=d.getMonth();while(d<=ganttEnd&&d.getMonth()===m){cnt++;d.setDate(d.getDate()+1);}const c=document.createElement('div');c.className='gh-cell';c.style.width=(cnt*cellPx)+'px';c.textContent=ms.toLocaleString('de-DE',{month:'short',year:'2-digit'});top.appendChild(c);}
    d=new Date(ganttStart);
    while(d<=ganttEnd){const c=document.createElement('div');c.className='gh-cell-sub';c.style.width=(7*cellPx)+'px';c.textContent='KW'+getWeekNr(d);bot.appendChild(c);d.setDate(d.getDate()+7);}
  } else {
    let d=new Date(ganttStart);
    while(d<=ganttEnd){const ys=new Date(d);let cnt=0,y=d.getFullYear();while(d<=ganttEnd&&d.getFullYear()===y){cnt++;d.setDate(d.getDate()+1);}const c=document.createElement('div');c.className='gh-cell';c.style.width=(cnt*cellPx)+'px';c.textContent=ys.getFullYear();top.appendChild(c);}
    d=new Date(ganttStart);
    while(d<=ganttEnd){const ms=new Date(d);let cnt=0,m=d.getMonth();while(d<=ganttEnd&&d.getMonth()===m){cnt++;d.setDate(d.getDate()+1);}const c=document.createElement('div');c.className='gh-cell-sub';c.style.width=(cnt*cellPx)+'px';c.textContent=ms.toLocaleString('de-DE',{month:'short'});bot.appendChild(c);}
  }
  document.getElementById('gantt-container').style.width=(totalDays*cellPx)+'px';
}

// ── GANTT ROWS ─────────────────────────────────────────────────────────────

function buildGrid(totalDays){
  const f=document.createDocumentFragment();
  if(scale==='day'){for(let i=0;i<=totalDays;i++){const d=addDays(ganttStart,i);const g=document.createElement('div');g.className='grid-line '+(d.getDay()===1?'major':'minor');g.style.left=(i*cellPx)+'px';f.appendChild(g);}}
  else if(scale==='week'){let d=new Date(ganttStart);while(d<=ganttEnd){const g=document.createElement('div');g.className='grid-line '+(d.getDate()<=7?'major':'minor');g.style.left=(daysBetween(ganttStart,d)*cellPx)+'px';f.appendChild(g);d.setDate(d.getDate()+7);}}
  else{let d=new Date(ganttStart);while(d<=ganttEnd){const g=document.createElement('div');g.className='grid-line '+(d.getMonth()===0?'major':'minor');g.style.left=(daysBetween(ganttStart,d)*cellPx)+'px';f.appendChild(g);d.setMonth(d.getMonth()+1);}}
  return f;
}

function renderGanttRows(){
  const body=document.getElementById('gantt-body');
  body.innerHTML='';
  const totalDays=daysBetween(ganttStart,ganttEnd)+1;
  const totalW=totalDays*cellPx;
  const grid=buildGrid(totalDays);

  rows.forEach(row=>{
    const visible=isVisible(row);
    const effStart=getEffStart(row);
    const tage=row.isGroup?getGroupTage(row):(+row.tage||1);
    const startD=parseDate(effStart);

    const rowDiv=document.createElement('div');
    let cls='gantt-row';
    if(row.isGroup) cls+=' group-gantt-row';
    if(!visible) cls+=' hidden-row';
    rowDiv.className=cls;
    rowDiv.style.width=totalW+'px';
    rowDiv.appendChild(grid.cloneNode(true));

    if(startD){
      const x=daysBetween(ganttStart,startD)*cellPx;
      const w=Math.max(cellPx,tage*cellPx);
      const color=COLORS[row.farbe]||'#555';

      const wrap=document.createElement('div');
      let wcls='gantt-bar-wrap';
      if(row.done) wcls+=' done';
      if(row.isGroup) wcls+=' group-wrap';
      wrap.className=wcls;
      wrap.style.left=x+'px';
      wrap.style.width=w+'px';

      const bar=document.createElement('div');
      bar.className='gantt-bar';
      if(!row.done) bar.style.background=color;

      wrap.appendChild(bar);

      // bracket for group: top bar + left leg + right leg
      if(row.isGroup){
        const bc=row.done?'#aaa':color;
        const bt=document.createElement('div'); bt.className='group-bracket-top';  bt.style.background=bc; wrap.appendChild(bt);
        const bl=document.createElement('div'); bl.className='group-bracket-l';    bl.style.background=bc; wrap.appendChild(bl);
        const br=document.createElement('div'); br.className='group-bracket-r';    br.style.background=bc; wrap.appendChild(br);
      } else {
        const rh=document.createElement('div'); rh.className='gantt-resize-handle'; wrap.appendChild(rh);
      }

      const label=document.createElement('div');
      label.className='gantt-label';
      label.textContent=fmtDate(startD)+'  '+row.vorgang;
      wrap.appendChild(label);

      // dblclick → done
      wrap.addEventListener('dblclick', e => { if(!e.target.closest('.gantt-resize-handle')) toggleDone(row.id); });

      makeDraggable(wrap, row.isGroup?null:wrap.querySelector('.gantt-resize-handle'), row);
      rowDiv.appendChild(wrap);
    }
    body.appendChild(rowDiv);
  });
}

function positionTodayLine(){
  const t=new Date(); t.setHours(0,0,0,0);
  if(!ganttStart) return;
  const x=daysBetween(ganttStart,t)*cellPx;
  const line=document.getElementById('today-line');
  if(x>=0){line.style.left=x+'px';line.style.display='block';}else line.style.display='none';
}

// ── DRAG & RESIZE ──────────────────────────────────────────────────────────

function makeDraggable(wrap, resizeHandle, row){
  if(resizeHandle){
    resizeHandle.addEventListener('mousedown',e=>{
      if(e.button!==0) return;
      e.preventDefault(); e.stopPropagation();
      const sx=e.clientX, ow=parseInt(wrap.style.width), ot=+row.tage||1;
      document.body.style.cursor='ew-resize';
      const mv=e2=>{ wrap.style.width=Math.max(cellPx,ow+e2.clientX-sx)+'px'; };
      const up=e2=>{ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); document.body.style.cursor=''; row.tage=String(Math.max(1,ot+Math.round((e2.clientX-sx)/cellPx))); renderAll(); };
      document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
    });
  }

  let lastClick=0;
  wrap.addEventListener('mousedown',e=>{
    if(e.button!==0) return;
    if(resizeHandle&&e.target.closest('.gantt-resize-handle')) return;
    if(row.isGroup) return;
    const now=Date.now(); if(now-lastClick<300) return; lastClick=now;
    e.preventDefault();
    const sx=e.clientX, ol=parseInt(wrap.style.left);
    document.body.style.cursor='grabbing';
    const mv=e2=>{ wrap.style.left=(ol+e2.clientX-sx)+'px'; };
    const up=e2=>{
      document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); document.body.style.cursor='';
      const delta=Math.round((e2.clientX-sx)/cellPx);
      const orig=parseDate(row.abh?getEffStart(row):row.start);
      if(!orig) return;
      const ns=addDays(orig,delta);
      if(row.abh){
        const dep=rows.find(r=>displayNr(r)===String(row.abh));
        if(dep){const de=parseDate(computeEnd(dep,getEffStart(dep)));if(de){row.verz=String(daysBetween(de,ns)-1);}}
      } else { row.start=fmtDate(ns); }
      renderAll();
    };
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
}

// ── SCROLL SYNC ────────────────────────────────────────────────────────────

function syncScroll(){
  const l=document.getElementById('left-body'), r=document.getElementById('right-panel');
  l.removeEventListener('scroll',l._h); r.removeEventListener('scroll',r._h);
  l._h=()=>{r.scrollTop=l.scrollTop;}; r._h=()=>{l.scrollTop=r.scrollTop;};
  l.addEventListener('scroll',l._h); r.addEventListener('scroll',r._h);
}

// ── RESIZER ────────────────────────────────────────────────────────────────

function initResizer(){
  const res=document.getElementById('resizer'), lp=document.getElementById('left-panel');
  lp.style.width=(localStorage.getItem('gantt_split')||'740')+'px';
  res.addEventListener('mousedown',e=>{
    if(e.button!==0) return; e.preventDefault(); res.classList.add('dragging');
    document.body.style.cursor='col-resize'; document.body.style.userSelect='none';
    const sx=e.clientX, sw=lp.offsetWidth;
    const mv=e2=>{lp.style.width=Math.max(200,Math.min(window.innerWidth-200,sw+e2.clientX-sx))+'px';};
    const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);res.classList.remove('dragging');document.body.style.cursor='';document.body.style.userSelect='';localStorage.setItem('gantt_split',lp.offsetWidth);};
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
}

// ── STATE ──────────────────────────────────────────────────────────────────

function loadState(){
  // 1. Try embedded data tag (present in saved .html files)
  try {
    const tag = document.getElementById('gantt-data');
    const txt = tag && tag.textContent.trim();
    if (txt) {
      const s = JSON.parse(txt);
      rows = s.rows; nextId = s.nextId; scale = s.scale;
      cellPx = COL_W[scale] || COL_W.week;
      document.getElementById('scaleSelect').value = scale;
      return;
    }
  } catch(e) { console.warn('Embedded state error', e); }
  // 2. Fallback: localStorage
  try {
    const r = localStorage.getItem('gantt_rows');
    const n = localStorage.getItem('gantt_nextId');
    const s = localStorage.getItem('gantt_scale');
    if (r) rows = JSON.parse(r);
    if (n) nextId = +n;
    if (s) { scale = s; document.getElementById('scaleSelect').value = s; cellPx = COL_W[s] || COL_W.week; }
  } catch(e) {}
}

function saveState(){
  try {
    localStorage.setItem('gantt_rows', JSON.stringify(rows));
    localStorage.setItem('gantt_nextId', nextId);
    localStorage.setItem('gantt_scale', scale);
  } catch(e) {}
}

// ── SAVE AS FILE ───────────────────────────────────────────────────────────
// Reads the page source via fetch() — works for file:// and http://.
// Injects current data into the <script id="gantt-data"> tag and downloads.

async function saveAsFile(){
  try {
    const resp = await fetch(location.href);
    let src = await resp.text();

    // Inject data using simple string split — no regex, no escape issues
    const TAG_OPEN  = '<script id="gantt-data" type="application/json">';
    const TAG_CLOSE = '<\/script>';
    const stateJson = JSON.stringify({rows, nextId, scale});
    const start = src.indexOf(TAG_OPEN);
    const end   = src.indexOf(TAG_CLOSE, start + TAG_OPEN.length);
    src = src.slice(0, start + TAG_OPEN.length) + stateJson + src.slice(end);

    const d = new Date();
    const name = 'terminplan_' + d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0') + '.html';
    const blob = new Blob([src], {type: 'text/html;charset=utf-8'});

    if (window.showSaveFilePicker) {
      try {
        const fh = await window.showSaveFilePicker({
          suggestedName: name,
          types: [{ description: 'HTML Datei', accept: {'text/html': ['.html']} }],
        });
        const ws = await fh.createWritable();
        await ws.write(blob);
        await ws.close();
        document.getElementById('statusText').textContent = 'Gespeichert \u2713';
        setTimeout(()=>document.getElementById('statusText').textContent='', 2000);
        return;
      } catch(e) { if (e.name === 'AbortError') return; }
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
    document.getElementById('statusText').textContent = 'Gespeichert \u2713';
    setTimeout(()=>document.getElementById('statusText').textContent='', 2000);

  } catch(err) {
    saveAsFileInline();
  }
}

// Inline fallback: builds file from stored template string
// TEMPLATE_START and TEMPLATE_END are set once at page load (see bottom)
let _tmplStart = '', _tmplEnd = '';

function saveAsFileInline(){
  const TAG_OPEN  = '<script id="gantt-data" type="application/json">';
  const TAG_CLOSE = '<\/script>';
  const stateJson = JSON.stringify({rows, nextId, scale});
  const start = _tmplStart.length; // _tmplStart ends right after TAG_OPEN
  const src = _tmplStart + stateJson + _tmplEnd;
  const d = new Date();
  const name = 'terminplan_' + d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0') + '.html';
  const blob = new Blob([src], {type: 'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
  document.getElementById('statusText').textContent = 'Gespeichert \u2713';
  setTimeout(()=>document.getElementById('statusText').textContent='', 2000);
}

function exportPDF(){
  document.getElementById('statusText').textContent='PDF-Export...';
  setTimeout(()=>{ window.print(); document.getElementById('statusText').textContent=''; }, 100);
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── INIT ───────────────────────────────────────────────────────────────────

loadState();
initResizer();

  rows.push({id:nextId++,parentId:null,isGroup:true, collapsed:false,vorgang:'Ausf\u00fchrung',   abh:'1',   verz:'0',start:fmtDate(today),tage:'1', farbe:'Anthrazit', done:false});

  rows.push({id:nextId++,parentId:4,  isGroup:false,collapsed:false,vorgang:'Rohbau',              abh:'1.2', verz:'0',start:'',            tage:'30',farbe:'Gr\u00fcn',  done:false});
  rows.push({id:nextId++,parentId:4,  isGroup:false,collapsed:false,vorgang:'Innenausbau',         abh:'2.2', verz:'-7',start:'',           tage:'20',farbe:'Orange',    done:false});

renderAll();

// Store split template for inline fallback save
// Split point is the gantt-data script tag
(function(){
  const full = document.documentElement.outerHTML;
  const tag  = '<script id="gantt-data" type="application/json">';
  const idx  = full.indexOf(tag);
  if (idx >= 0) {
    _tmplStart = full.substring(0, idx + tag.length);
    const endTag = '</scr' + 'ipt>';
    const endIdx = full.indexOf(endTag, idx + tag.length);
    _tmplEnd = full.substring(endIdx);
  }
})();
